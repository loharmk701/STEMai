# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEMbotix AI — Nginx Reverse Proxy Config
#  Subdomain: learn.blockzieai.com  →  frontend (Gunicorn :3000)
#
#  Install on the VPS:
#    sudo cp nginx/stemai.conf /etc/nginx/sites-available/learn.blockzieai.com
#    sudo ln -s /etc/nginx/sites-available/learn.blockzieai.com /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#
#  Then add HTTPS (Certbot rewrites this file to add the 443 block + redirect):
#    sudo certbot --nginx -d learn.blockzieai.com
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

server {
    listen 80;
    listen [::]:80;
    server_name learn.blockzieai.com;

    # ── Security headers ──────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "same-origin"   always;

    # ── Large file / streaming upload support ─────────
    client_max_body_size 50M;

    # ── Proxy to Flask/Gunicorn frontend container ────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Match Flask/app.py proxy timeout
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
        proxy_connect_timeout 10s;
    }

    # ── Static files — let Nginx serve them directly (faster) ──
    # NOTE: this path must match where you cloned the repo on the VPS.
    # If it doesn't match, delete this block — /static/ will still work
    # by being proxied through Gunicorn above.
    location /static/ {
        alias /home/blockzie/STEMai/STEMai-frontend/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
